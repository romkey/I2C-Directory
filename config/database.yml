# PostgreSQL configuration.
#
# Development and test connect to the Dockerized "postgresql" service.
# Production uses DATABASE_URL from the environment.
default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST", "postgresql") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: i2capp_development

test:
  <<: *default
  database: i2capp_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
